<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stremio Addon Fusion</title>
    <script>
      (function() {
        if (typeof window !== 'undefined') {
          if (typeof window.global === 'undefined') {
            window.global = window;
          }
          try {
            var nativeFetch = window.fetch;
            var currentFetch = typeof nativeFetch === 'function' ? nativeFetch.bind(window) : nativeFetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentFetch;
              },
              set: function(fn) {
                currentFetch = fn;
              }
            });
          } catch (e) {
            console.warn('[Polyfill] Could not redefine window.fetch descriptor:', e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
